name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run ./... --timeout=5m

      - name: Test
        run: go test ./... -timeout 30s -race

      - name: Test coverage
        run: go test ./... -timeout 30s -coverprofile=coverage.out && go tool cover -func=coverage.out | tail -1
