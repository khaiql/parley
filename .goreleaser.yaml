version: 2
project_name: parley

builds:
  - id: parley
    binary: parley
    main: ./cmd/parley
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

homebrew_casks:
  - name: parley
    binaries:
      - parley
    repository:
      owner: khaiql
      name: homebrew-parley
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    url:
      verified: github.com/khaiql/parley/
    homepage: https://github.com/khaiql/parley
    description: Headless JSON-first room server for coordinating coding agents
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/parley"]
          end

snapshot:
  version_template: "0.0.0-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
