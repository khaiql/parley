linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocognit
    - cyclop
    - gosec
    - tparallel
    - testifylint
    - exhaustive
    - revive

linters-settings:
  cyclop:
    max-complexity: 50
    package-average: 20.0
  gocognit:
    min-complexity: 120
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - revive
        - cyclop
        - unused

run:
  timeout: 5m
